# ============================================================
# Upsert Validation Schema
# ============================================================
# Dialect:  postgresql
# Schema:   code_sample
#
# Tables covered (in dependency order — data files must
# respect this ordering for FOREIGN_CYCLE generators):
#
#   1. tag            (standalone lookup — no FKs)
#   2. users          (standalone — no FKs)
#   3. post           (FK → users)
#   4. post_tag       (FK → post, tag  — compound PK + compound FK)
#   5. audit_log      (FK → users, post)
#   6. post_approval  (FK → post, users — compound unique)
# ============================================================

dialect: postgresql
schema: code_sample
rootDataPath: ../data

validation:
  defaultNullable: true
  strictFields: true


tables:

  # ──────────────────────────────────────────────
  # TABLE: tag
  # Standalone lookup table.
  # ON CONFLICT DO NOTHING — re-running seeds must be safe.
  # ──────────────────────────────────────────────
  - tableName: tag
    description: "Content classification tags"
    files:
      - tag.yaml
    primaryKey: [id]

    onConflict:
      target: [id]
      action: doNothing

    columns:
      - name: id
        datatype: INTEGER
        constraints:
          - constraint: REQUIRED

      - name: name
        datatype: VARCHAR(100)
        constraints:
          - constraint: REQUIRED
          - constraint: UNIQUE
            conflictTarget: true
          - constraint: PATTERN
            regex: "^[A-Za-z0-9_\\-]{1,100}$"
            message: "tag name must be alphanumeric, hyphens or underscores only"

      - name: column_order
        datatype: INTEGER
        default:
          kind: GENERATOR
          value: "SEQUENCE(10,10)"


  # ──────────────────────────────────────────────
  # TABLE: users
  # ──────────────────────────────────────────────
  - tableName: users
    description: "Users in the system"
    files:
      - users.yaml
      - users2.yaml
    primaryKey: [id]

    onConflict:
      target: [id]
      action: update
      excludeFromUpdate:
        - id
        - createTs

    columns:
      - name: id
        datatype: INTEGER
        constraints:
          - constraint: REQUIRED

      - name: source
        datatype: VARCHAR(30)
        default:
          kind: LITERAL
          value: "Knoppen"
        constraints:
          - constraint: PATTERN
            regex: "^[A-Za-z0-9_]+$"
            message: "source must be alphanumeric with underscores only"

      - name: type
        datatype: VARCHAR(30)
        constraints:
          - constraint: ENUM
            values: ["USER", "SUPERVISOR", "ADMIN"]
            message: "type must be one of USER, SUPERVISOR, ADMIN"

      - name: createTs
        datatype: TIMESTAMP
        default:
          kind: FUNCTION
          value: CURRENT_TIMESTAMP

      - name: approvedTs
        datatype: TIMESTAMP
        constraints:
          - constraint: TEMPORAL
            notFuture: true
            notPast: "-P4Y"

      - name: username
        datatype: VARCHAR(255)
        constraints:
          - constraint: REQUIRED
          - constraint: UNIQUE
            conflictTarget: true
          - constraint: PATTERN
            regex: "^[a-zA-Z0-9_]{3,50}$"
            message: "username must be 3–50 alphanumeric characters or underscores"

      - name: metadata
        datatype: JSONB
        default:
          kind: EXPRESSION
          value: "'[]'::jsonb"


  # ──────────────────────────────────────────────
  # TABLE: post
  # ──────────────────────────────────────────────
  - tableName: post
    description: "User-authored posts"
    files:
      - post.yaml
    primaryKey: [id]

    onConflict:
      target: [id]
      action: update
      excludeFromUpdate:
        - id
        - user_id

    columns:
      - name: id
        datatype: INTEGER
        constraints:
          - constraint: REQUIRED

      - name: user_id
        datatype: INTEGER
        foreignKey:
          schema: code_sample
          table: users
          columns: [id]
          onUpdate: cascade
        constraints:
          - constraint: REQUIRED

      - name: title
        datatype: TEXT
        constraints:
          - constraint: REQUIRED
          - constraint: PATTERN
            regex: "^[A-Za-z0-9 _\\-!?]{1,200}$"
            message: "Title must be 1–200 characters; letters, numbers, spaces, and _-!? only"

      - name: percent_approved
        datatype: NUMERIC(8,2)
        constraints:
          - constraint: REQUIRED

      - name: column_order
        datatype: INTEGER
        default:
          kind: GENERATOR
          value: "SEQUENCE(10,10)"


  # ──────────────────────────────────────────────
  # TABLE: post_tag
  # Junction table — compound PK, compound FK.
  # ON CONFLICT DO NOTHING — safe to re-run.
  # ──────────────────────────────────────────────
  - tableName: post_tag
    description: "Many-to-many relationship between posts and tags"
    files:
      - post_tag.yaml
    primaryKey: [post_id, tag_id]

    onConflict:
      target: [post_id, tag_id]
      action: doNothing

    columns:
      - name: post_id
        datatype: INTEGER
        foreignKey:
          schema: code_sample
          table: post
          columns: [id]
          onUpdate: cascade
        constraints:
          - constraint: REQUIRED

      - name: tag_id
        datatype: INTEGER
        foreignKey:
          schema: code_sample
          table: tag
          columns: [id]
          onUpdate: cascade
        constraints:
          - constraint: REQUIRED

      - name: column_order
        datatype: INTEGER
        default:
          kind: GENERATOR
          value: "SEQUENCE(10,10)"


  # ──────────────────────────────────────────────
  # TABLE: audit_log
  # Append-only event log.
  # ON CONFLICT DO NOTHING — never overwrite a log entry.
  # Exercises: TIMESTAMP_OFFSET generator, FOREIGN_CYCLE generator.
  # ──────────────────────────────────────────────
  - tableName: audit_log
    description: "Immutable record of system events"
    files:
      - audit_log.yaml
    primaryKey: [id]

    onConflict:
      target: [id]
      action: doNothing

    columns:
      - name: id
        datatype: INTEGER
        constraints:
          - constraint: REQUIRED

      - name: user_id
        datatype: INTEGER
        foreignKey:
          schema: code_sample
          table: users
          columns: [id]

      - name: post_id
        datatype: INTEGER
        foreignKey:
          schema: code_sample
          table: post
          columns: [id]

      - name: event
        datatype: VARCHAR(50)
        constraints:
          - constraint: REQUIRED
          - constraint: ENUM
            values: ["USER_CREATED","POST_CREATED","POST_UPDATED","POST_APPROVED","POST_REJECTED"]
            message: "event must be a known audit event type"

      - name: event_ts
        datatype: TIMESTAMP
        default:
          kind: GENERATOR
          value: "TIMESTAMP_OFFSET(HOURS,-6)"

      - name: notes
        datatype: TEXT


  # ──────────────────────────────────────────────
  # TABLE: post_approval
  # One approval decision per (post, approver) pair.
  # Exercises: compound unique ON CONFLICT target,
  #            FOREIGN_CYCLE generator, SEQUENCE generator.
  # ──────────────────────────────────────────────
  - tableName: post_approval
    description: "Approval decisions made by supervisors on posts"
    files:
      - post_approval.yaml
    primaryKey: [id]

    onConflict:
      target: [post_id, approver_id]   # compound unique — not the PK
      action: update
      excludeFromUpdate:
        - id
        - post_id
        - approver_id
        - decided_ts                    # preserve original decision timestamp

    columns:
      - name: id
        datatype: INTEGER
        constraints:
          - constraint: REQUIRED

      - name: post_id
        datatype: INTEGER
        foreignKey:
          schema: code_sample
          table: post
          columns: [id]
        constraints:
          - constraint: REQUIRED

      - name: approver_id
        datatype: INTEGER
        foreignKey:
          schema: code_sample
          table: users
          columns: [id]
        constraints:
          - constraint: REQUIRED

      - name: decision
        datatype: VARCHAR(20)
        constraints:
          - constraint: REQUIRED
          - constraint: ENUM
            values: ["APPROVED","REJECTED","ABSTAINED"]
            message: "decision must be APPROVED, REJECTED, or ABSTAINED"

      - name: decided_ts
        datatype: TIMESTAMP
        default:
          kind: FUNCTION
          value: CURRENT_TIMESTAMP

      - name: column_order
        datatype: INTEGER
        default:
          kind: GENERATOR
          value: "SEQUENCE(10,10)"
