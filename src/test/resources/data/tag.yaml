# ============================================================
# Data file: tag
# Standalone -- no foreign key dependencies.
# Exercises:
#   - ON CONFLICT DO NOTHING
#   - GROUPED_SEQUENCE generator (column_order resets per category)
#   - Duplicate PK row (id: 3) to prove DO NOTHING fires
#     and does not overwrite the name
# ============================================================


# -- category: IT --------------------------------------
- id: 1
  category: "IT"
  name: "hardware"
  # column_order generated: 0 (first row of the IT group)

- id: 2
  category: "IT"
  name: "software"
  # column_order generated: 10

- id: 3
  category: "IT"
  name: "cloud"
  # column_order generated: 20

# -- category: SPORTS (group change resets the sequence) --
- id: 4
  category: "SPORTS"
  name: "soccer"
  # column_order generated: 0 (category changed IT -> SPORTS)

- id: 5
  category: "SPORTS"
  name: "football"
  # column_order generated: 10

- id: 6
  category: "SPORTS"
  name: "baseball"
  # column_order generated: 20

- id: 7
  category: "SPORTS"
  name: "tennis"
  # column_order generated: 30

# -- ON CONFLICT DO NOTHING exercise ------------------
# id: 3 already exists as "cloud" (category IT).
# With DO NOTHING this row is silently skipped --
# "cloud" must remain the name in the database.
- id: 3
  category: "SPORTS"
  name: "THIS_SHOULD_NOT_APPEAR"
  # column_order generated: 40 (continues the SPORTS group; also discarded)
